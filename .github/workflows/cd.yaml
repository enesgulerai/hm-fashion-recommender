name: CD Pipeline - Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. MODEL PRODUCTION PHASE ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies and Build ONNX Model
        run: |
          pip install -r requirements/build.txt
          python -m src.models.export_onnx

      # --- 2. DOCKER ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- BACKEND BUILD & PUSH ---
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: enesgulerml/hm-backend:latest
          cache-from: type=registry,ref=enesgulerml/hm-backend:latest
          cache-to: type=inline

      # --- FRONTEND BUILD & PUSH ---
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: enesgulerml/hm-frontend:latest
          cache-from: type=registry,ref=enesgulerml/hm-frontend:latest
          cache-to: type=inline
