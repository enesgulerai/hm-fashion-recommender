name: CD - Deploy to K3s (AWS)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 20m
          command_timeout: 40m
          script: |
            set -e
            cd /home/ubuntu/hm-fashion-recommender
            
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # --- BACKEND ---
            echo "Building Backend..."
            docker build -t hm-backend:latest -f Dockerfile.api .
            
            echo "Importing Backend to K3s..."
            docker save hm-backend:latest | sudo k3s ctr images import -
            
            echo "Cleaning Backend Artifacts..."
            docker rmi hm-backend:latest
            
            echo "Cooldown (30s)..."
            sleep 30
            
            # --- FRONTEND ---
            echo "Building Frontend..."
            docker build -t hm-frontend:latest -f Dockerfile.frontend .
            
            echo "Importing Frontend to K3s..."
            docker save hm-frontend:latest | sudo k3s ctr images import -
            
            echo "Cleaning Frontend Artifacts..."
            docker rmi hm-frontend:latest
            
            echo "Final Cooldown (30s)..."
            sleep 30
            
            # --- RESTART ---
            echo "Restarting Kubernetes Deployments..."
            sudo kubectl rollout restart deployment backend
            sudo kubectl rollout restart deployment frontend
            
            echo "Deployment Successful!"