name: CD - Deploy H&M App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 30m
          script: |
            # Exit immediately if a command exits with a non-zero status
            set -e

            # Navigate to project directory
            cd /home/ubuntu/hm-fashion-recommender

            echo "Fetching latest changes from Git..."
            git pull origin main

            echo "FIX: Downloading standalone Docker Compose V2..."
            curl -SL https://github.com/docker/compose/releases/download/v2.29.1/docker-compose-linux-x86_64 -o ./docker-compose
            chmod +x ./docker-compose

            echo "Starting deployment with Docker Compose V2..."
            ./docker-compose up --build -d

            echo "Performing safe cleanup..."
            docker image prune -f