name: CD Pipeline - Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. MODEL PRODUCTION PHASE ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies and Build ONNX Model
        run: |
          pip install -r requirements/build.txt
          python -m src.models.export_onnx

      # --- 2. DOCKER SETUP ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 3. BACKEND: BUILD -> SCAN -> PUSH ---
      - name: Build Backend (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          load: true
          tags: enesgulerml/hm-backend:latest
          cache-from: type=registry,ref=enesgulerml/hm-backend:latest

      - name: Run Trivy Vulnerability Scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'enesgulerml/hm-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend to Docker Hub
        run: docker push enesgulerml/hm-backend:latest

      # --- 4. FRONTEND: BUILD -> SCAN -> PUSH ---
      - name: Build Frontend (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: false
          load: true
          tags: enesgulerml/hm-frontend:latest
          cache-from: type=registry,ref=enesgulerml/hm-frontend:latest

      - name: Run Trivy Vulnerability Scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'enesgulerml/hm-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend to Docker Hub
        run: docker push enesgulerml/hm-frontend:latest
