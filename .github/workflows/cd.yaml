name: CD - Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- BACKEND BUILD & PUSH ---
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: enesgulerml/hm-backend:latest
          cache-from: type=registry,ref=enesgulerml/hm-backend:latest
          cache-to: type=inline

      # --- FRONTEND BUILD & PUSH ---
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: enesgulerml/hm-frontend:latest
          cache-from: type=registry,ref=enesgulerml/hm-frontend:latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Starting Deployment..."
            
            cd /home/ubuntu/hm-fashion-recommender
            git pull origin main
            

            kubectl apply -f k8s/apps/
            
            echo "Rolling out restart..."
            kubectl rollout restart deployment backend
            kubectl rollout restart deployment frontend
            
            echo "Deployment Triggered! Watch pods with: kubectl get pods -w"