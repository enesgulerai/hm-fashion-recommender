name: CI Pipeline - Quality & Tests

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # --- 1. SECURITY SCAN (FILESYSTEM) ---
      - name: Run Trivy Vulnerability Scanner (Repo FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'library'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "sentence-transformers>=3.0.0" torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements/backend.txt
          pip install -r requirements/dev.txt

      # --- 2. CODE QUALITY ---
      - name: Check Code Formatting (Black)
        run: black --check .

      - name: Check Import Sorting (Isort)
        run: isort --check-only --profile black .

      # --- 3. RUN TESTS ---
      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/
