name: Deploy H&M App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 30m
          script: |
            set -e

            cd /home/ubuntu/hm-fashion-recommender

            echo "Git pull is in progress..."
            git pull origin main

            echo "Old containers are being discontinued..."
            docker-compose down

            echo "Disk cleaning (Prune) is being performed..."
            docker system prune -a -f

            echo "New build is starting..."
            docker-compose up --build -d --force-recreate