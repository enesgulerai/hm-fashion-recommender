# --- Redis PVC ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.redis.storage.pvcName }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.redis.storage.size }}
---
# --- Qdrant PVC ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.qdrant.storage.pvcName }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.qdrant.storage.size }}